# VictoriaMetrics Operator configuration
# Installed in monitoring namespace
# Used by ruler-controller to create VMRule CRDs

resources:
  operator:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 64Mi

admissionWebhooks:
  enabled: false

rbac:
  create: true

serviceAccount:
  create: true
